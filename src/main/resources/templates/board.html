<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>신고 게시판 - SafeTrip</title>
  <link rel="stylesheet"
        th:href="@{/css/index.css}">
  <link rel="stylesheet"
        th:href="@{/css/board.css}">

  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

<header class="navbar">
  <div class="logo">
    <i data-lucide="shield-check"></i>
    <span>SAFE TRIP</span>
  </div>

  <nav>
    <a th:href="@{/}">홈</a>

    <a th:href="@{/region}">지역 검색</a>

    <a th:href="@{/report}">안전 리포트</a>

    <a th:href="@{/map}">지도</a>

    <a th:href="@{/guide}">예방 가이드</a>

    <a th:href="@{/board}" class="active">
      신고 게시판
    </a>

    <a th:href="@{/users/login}" class="login-btn">
      로그인
    </a>
  </nav>

</header>

<main class="board-page">

  <section class="board-title">
    <div>
      <p>COMMUNITY REPORT</p>
      <h1>신고 게시판</h1>
      <span>위험 장소, 불안 요소, 안전 관련 정보를 공유하는 공간입니다.</span>
    </div>

    <a th:href="@{/board/write}" class="write-btn">
      <i data-lucide="pen-line"></i>
      글쓰기
    </a>
  </section>

  <section class="board-toolbar">
    <div class="tabs">
      <button class="active">전체</button>
      <button>위험 지역</button>
      <button>어두운 골목</button>
      <button>CCTV 부족</button>
      <button>수상한 사람</button>
      <button>기타</button>
    </div>

    <div class="search-box-board">
      <input type="text" placeholder="제목, 지역을 검색하세요">
      <button>
        <i data-lucide="search"></i>
      </button>
    </div>
  </section>

  <section class="table-card">
    <table>
      <thead>
        <tr>
          <th>번호</th>
          <th>카테고리</th>
          <th class="title-col">제목</th>
          <th>지역</th>
          <th>작성자</th>
          <th>작성일</th>
          <th>조회수</th>
        </tr>
      </thead>

      <tbody>

      <tr th:each="report : ${reports}">

        <td th:text="${report.id}"></td>

        <td>
    <span class="badge danger"
          th:text="${report.dangerLevel}">
    </span>
        </td>

        <td class="post-title"
            th:text="${report.title}">
        </td>

        <td th:text="${report.region.sigungu}"></td>

        <td th:text="${report.user.nickname}"></td>

        <td th:text="${#temporals.format(report.createdAt, 'yyyy.MM.dd')}">
        </td>

        <td>0</td>

      </tr>

      </tbody>
    </table>
  </section>

  <div class="pagination">
    <button class="active">1</button>
    <button>2</button>
    <button>3</button>
    <button>4</button>
    <button>5</button>
  </div>

</main>

<script>
  lucide.createIcons();
</script>

</body>
</html>
