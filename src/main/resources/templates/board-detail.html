<!DOCTYPE html>
<!-- SAFE TRIP - 신고 게시글 상세 (수정·삭제는 작성자만) -->
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>신고 상세 | SAFE TRIP</title>

    <link rel="stylesheet"
          th:href="@{/css/index.css}">

    <link rel="stylesheet"
          th:href="@{/css/board-detail.css}">

    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

<div th:replace="~{fragments/navbar :: navbar('board')}"></div>

<main class="detail-page">

    <div th:if="${errorMessage}"
         class="auth-error-banner"
         th:text="${errorMessage}"></div>

    <section class="detail-card">

        <div class="detail-top">

            <span class="category-badge"
                  th:text="${report.category}">
            </span>

            <h1 th:text="${report.title}"></h1>

            <div class="meta">

                <span>
                    지역 :
                    <span th:text="${report.regionName}"></span>
                </span>

                <span>
                    작성자 :
                    <span th:text="${report.nickname}"></span>
                </span>

                <span>
                    작성일 :
                    <span th:text="${report.createdAt}"></span>
                </span>

                <span>
                    조회수 :
                    <span th:text="${report.views}"></span>
                </span>

            </div>

        </div>

        <div class="detail-content">

            <p th:text="${report.content}">
            </p>

        </div>

        <div class="detail-info">

            <h3>위치 정보</h3>

            <p th:text="${report.regionName}">
            </p>

        </div>

        <div class="detail-actions">

            <a th:href="@{/board}"
               class="list-btn">

                <i data-lucide="list"></i>

                목록으로

            </a>

            <div th:if="${canEdit}">

                <a th:href="@{/board/edit/{id}(id=${report.id})}">
                    <button class="edit-btn" type="button">
                        수정
                    </button>
                </a>

                <form th:action="@{/board/{id}(id=${report.id})}"
                      method="post"
                      style="display:inline;">

                    <input type="hidden"
                           name="_method"
                           value="delete">

                    <button type="submit"
                            class="delete-btn">

                        삭제

                    </button>

                </form>

            </div>

        </div>

    </section>

</main>

<script>
    lucide.createIcons();
</script>

</body>
</html>
