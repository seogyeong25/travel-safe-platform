<!DOCTYPE html>
<!-- SAFE TRIP - 로그인 (Spring Security 폼 로그인) -->
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>SafeTrip 로그인</title>
  <link rel="stylesheet"
        th:href="@{/css/index.css}">
  <link rel="stylesheet"
        th:href="@{/css/login.css}">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

<header class="navbar">
  <div class="logo">
    <i data-lucide="shield-check"></i>
    <span>SAFE TRIP</span>
  </div>

  <nav class="nav-menu">
    <a th:href="@{/}">홈</a>
    <a th:href="@{/region}">지역 검색</a>
    <a th:href="@{/report}">안전 리포트</a>
    <a th:href="@{/map}">지도</a>
    <a th:href="@{/guide}">예방 가이드</a>
    <a th:href="@{/board}">신고 게시판</a>
  </nav>

  <a href="/users/signup" class="login-btn">회원가입</a>
</header>

<main class="login-page">
  <section class="login-left">
    <div class="overlay"></div>

    <div class="left-content">
      <div class="shield-icon">🛡️</div>

      <h1>SAFE TRIP</h1>

      <p>
        안전한 여행을 위한<br>
        스마트 여행 안전 플랫폼
      </p>
    </div>
  </section>

  <section class="login-right">
    <div class="login-box">
      <h2>로그인</h2>
      <p class="login-desc">계정에 로그인하여 서비스를 이용하세요.</p>

      <form th:action="@{/users/login}" method="post">
        <label>아이디</label>
        <input type="text" name="username" placeholder="아이디를 입력하세요" required>

        <label>비밀번호</label>
        <div class="password-box">
          <input type="password" name="password" placeholder="비밀번호를 입력하세요" required>
          <i data-lucide="eye"></i>
        </div>

        <div class="login-option">
          <label class="save-id">
            <input type="checkbox">
            <span>아이디 저장</span>
          </label>

          <a href="#">비밀번호 찾기</a>
        </div>

        <button type="submit" class="login-submit">로그인</button>
      </form>

      <div class="divider">
        <span></span>
        <p>또는</p>
        <span></span>
      </div>

      <button class="google-btn">
        <span>G</span>
        Google 계정으로 로그인
      </button>

      <p class="signup-link">
        아직 계정이 없으신가요? <a href="/users/signup">회원가입</a>
      </p>
    </div>
  </section>
</main>

<script>
  lucide.createIcons();
</script>

</body>
</html>
