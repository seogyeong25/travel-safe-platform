<!DOCTYPE html>
<!-- SAFE TRIP - 신고 글쓰기 폼 -->
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>신고 글쓰기 | SAFE TRIP</title>

    <link rel="stylesheet" th:href="@{/css/index.css}">
    <link rel="stylesheet" th:href="@{/css/board-write.css}">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar('board')}"></div>

<main class="write-page">

    <section class="write-header">
        <div>
            <p>COMMUNITY REPORT</p>
            <h1>신고 글쓰기</h1>
            <span>위험 장소, 불안 요소, 안전 관련 정보를 공유해주세요.</span>
        </div>

        <a th:href="@{/board}" class="back-btn">
            <i data-lucide="list"></i>
            목록으로
        </a>
    </section>

    <section class="write-layout">

        <form class="write-form"
              th:action="@{/board/write}"
              method="post">

            <div class="form-group">
                <label for="category">카테고리</label>
                <select id="category" name="category" required>
                    <option value="위험 지역">위험 지역</option>
                    <option value="어두운 골목">어두운 골목</option>
                    <option value="CCTV 부족">CCTV 부족</option>
                    <option value="수상한 사람">수상한 사람</option>
                    <option value="교통 위험">교통 위험</option>
                    <option value="기타">기타</option>
                </select>
            </div>

            <div class="form-group">
                <label for="dangerLevel">위험도</label>
                <select id="dangerLevel" name="dangerLevel" required>
                    <option value="낮음">낮음</option>
                    <option value="보통" selected>보통</option>
                    <option value="높음">높음</option>
                </select>
            </div>

            <div class="form-group">
                <label for="sido">시/도</label>
                <select id="sido">
                    <option value="">시/도 선택</option>
                    <option th:each="sido : ${sidoList}"
                            th:value="${sido}"
                            th:text="${sido}">
                    </option>
                </select>
            </div>

            <div class="form-group">
                <label for="region">시/군/구</label>
                <select id="region" name="regionId" required>
                    <option value="">시군구 선택</option>
                    <option th:each="r : ${regions}"
                            th:value="${r.id}"
                            th:text="${r.sigungu}"
                            th:data-sido="${r.sido}">
                    </option>
                </select>
            </div>

            <div class="form-group">
                <label for="title">제목</label>
                <input id="title"
                       name="title"
                       type="text"
                       placeholder="제목을 입력하세요"
                       required>
            </div>

            <div class="form-group">
                <label for="content">내용</label>
                <textarea id="content"
                          name="content"
                          placeholder="위험 상황, 위치, 시간대 등 자세한 내용을 입력하세요."
                          required></textarea>
            </div>

            <div class="form-actions">
                <a th:href="@{/board}" class="cancel-btn">취소</a>
                <button type="submit" class="submit-btn">등록하기</button>
            </div>

        </form>

        <aside class="write-guide">
            <div class="guide-card">
                <i data-lucide="info"></i>
                <h3>작성 안내</h3>
                <p>
                    실제 긴급 상황은 게시판이 아닌 112에 신고해주세요.
                    본 게시판은 여행자 간 안전 정보 공유를 위한 공간입니다.
                </p>
            </div>

            <div class="guide-card">
                <i data-lucide="map-pin"></i>
                <h3>위치 정보</h3>
                <p>
                    시/도·시군구를 정확히 선택하면 안전 리포트·지도에서
                    해당 지역 정보와 함께 표시됩니다.
                </p>
            </div>

            <div class="guide-card warning">
                <i data-lucide="shield-alert"></i>
                <h3>주의 사항</h3>
                <p>
                    허위 신고, 개인정보 노출, 특정인 비방 내용은 제한될 수 있습니다.
                </p>
            </div>
        </aside>

    </section>

</main>

<script th:inline="javascript">
    lucide.createIcons();

    const sidoSelect = document.getElementById("sido");
    const regionSelect = document.getElementById("region");

    const allRegionOptions = Array.from(
        regionSelect.querySelectorAll("option[data-sido]")
    ).map(option => option.cloneNode(true));

    function filterRegions() {
        const selectedSido = sidoSelect.value;

        regionSelect.innerHTML = '<option value="">시군구 선택</option>';

        allRegionOptions.forEach(option => {
            if (!selectedSido || option.dataset.sido === selectedSido) {
                regionSelect.appendChild(option.cloneNode(true));
            }
        });
    }

    sidoSelect.addEventListener("change", filterRegions);
</script>

</body>
</html>
