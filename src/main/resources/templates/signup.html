<!DOCTYPE html>
<!-- SAFE TRIP - 회원가입 -->
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>SafeTrip 회원가입</title>
  <link rel="stylesheet"
        th:href="@{/css/index.css}">  <link rel="stylesheet"
        th:href="@{/css/signup.css}">  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

<header class="navbar">
  <div class="logo">
    <i data-lucide="shield-check"></i>
    <span>SAFE TRIP</span>
  </div>

  <nav class="nav-menu">
    <a th:href="@{/}">홈</a>
    <a th:href="@{/region}">지역 검색</a>
    <a th:href="@{/report}">안전 리포트</a>
    <a th:href="@{/map}">지도</a>
    <a th:href="@{/guide}">예방 가이드</a>
    <a th:href="@{/board}">신고 게시판</a>
  </nav>

  <a href="/users/login" class="login-btn">로그인</a>
</header>

<main class="auth-page">
  <section class="auth-left">

  <div class="overlay"></div>

  <div class="left-content">
    <div class="shield-icon">
      🛡️
    </div>

    <h1>SAFE TRIP</h1>

    <p>
      안전한 여행을 위한<br>
      스마트 여행 안전 플랫폼
    </p>
  </div>

</section>

  <section class="auth-box">
    <h2>회원가입</h2>
    <p class="auth-desc">계정을 만들고 여행지 안전 정보를 확인하세요.</p>

    <div th:if="${errorMessage}" class="auth-error-banner" th:text="${errorMessage}"></div>

    <form th:action="@{/users/signup}" th:object="${registerRequest}" method="post">
      <label>아이디</label>
      <input type="text" th:field="*{username}" placeholder="아이디를 입력하세요">
      <p class="field-error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></p>

      <label>비밀번호</label>
      <input type="password" th:field="*{password}" placeholder="비밀번호를 입력하세요">
      <p class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>

      <label>비밀번호 확인</label>
      <input type="password" th:field="*{passwordConfirm}" placeholder="비밀번호를 다시 입력하세요">

      <label>닉네임</label>
      <input type="text" th:field="*{nickname}" placeholder="닉네임을 입력하세요">
      <p class="field-error" th:if="${#fields.hasErrors('nickname')}" th:errors="*{nickname}"></p>

      <label>이메일</label>
      <input type="email" th:field="*{email}" placeholder="이메일을 입력하세요">
      <p class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>

      <button type="submit" class="auth-btn">회원가입</button>
    </form>

    <p class="auth-link">
      이미 계정이 있으신가요? <a href="/users/login">로그인</a>
    </p>
  </section>
</main>

<script>
  lucide.createIcons();
</script>

</body>
</html>
