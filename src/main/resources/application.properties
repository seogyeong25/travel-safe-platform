# =============================================================================
# SAFE TRIP - application.properties
# Spring Boot 애플리케이션 공통 설정 (로컬 개발용)
# =============================================================================

spring.application.name=travel_safe_platform

# --- MySQL 데이터소스 ---
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/travel_safe_platform?serverTimezone=Asia/Seoul&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234

# --- JPA / Hibernate ---
# ddl-auto=update: 엔티티 변경 시 스키마 자동 반영 (운영 환경에서는 validate 등 권장)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- MVC: HTML 폼에서 PUT·DELETE (_method hidden 필드) ---
spring.mvc.hiddenmethod.filter.enabled=true

# --- Kakao Maps JavaScript API 키 (지도·지오코더) ---
# https://developers.kakao.com 에서 발급 후 로컬/배포 환경별로 분리 권장
kakao.map.javascript-key=c4960653808cf2250702bb9988abf2aa